name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Build
        run: swift build --build-tests

      - name: Test AgentSDK (protocol layer)
        run: swift test --filter AgentSDKTests

      - name: Test AgentSDKClaudeCode (CLI implementation)
        run: swift test --filter AgentSDKClaudeCodeTests

      - name: Test IntegrationTests (skipped without env var)
        run: swift test --filter IntegrationTests
